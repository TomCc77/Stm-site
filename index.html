<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Montreal Trip Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&amp;family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  >
  <style>
    :root {
      --paper: #fffaf1;
      --paper-strong: rgba(255, 250, 241, 0.96);
      --paper-soft: rgba(255, 250, 241, 0.78);
      --ink: #162238;
      --muted: #536176;
      --line: rgba(22, 34, 56, 0.1);
      --shadow: 0 24px 60px rgba(22, 34, 56, 0.18);
      --hotel: #d1a337;
      --food: #e66a42;
      --bars: #0d8b8f;
      --nightlife: #da3f68;
      --sightseeing: #4064d8;
      --action: #162238;
      --action-text: #fffaf1;
      --success: #2f9e72;
      --radius-lg: 28px;
      --radius-md: 20px;
      --radius-sm: 14px;
      --map-tools-top: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(64, 100, 216, 0.16), transparent 38%),
        radial-gradient(circle at top right, rgba(230, 106, 66, 0.14), transparent 32%),
        linear-gradient(180deg, #f2ece1 0%, #faf7f0 100%);
    }

    body {
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(22, 34, 56, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22, 34, 56, 0.03) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 92%);
    }

    #app,
    #map {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
    }

    #map {
      position: relative;
      z-index: 1;
    }

    .leaflet-tile {
      filter: saturate(1.12) contrast(1.03);
    }

    .trip-panel {
      position: absolute;
      top: max(18px, calc(env(safe-area-inset-top) + 10px));
      left: max(18px, calc(env(safe-area-inset-left) + 18px));
      z-index: 800;
      width: min(390px, calc(100vw - 36px));
      max-height: calc(100vh - 36px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, var(--paper-strong) 0%, var(--paper-soft) 100%);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: transform 220ms ease, opacity 220ms ease, visibility 220ms ease;
    }

    .trip-panel.is-hidden-panel {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateX(calc(-100% - 18px));
    }

    .panel-header {
      padding: 22px 22px 18px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(64, 100, 216, 0.1), transparent 42%),
        linear-gradient(225deg, rgba(230, 106, 66, 0.08), transparent 34%);
    }

    .eyebrow {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 0.96;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.55;
      max-width: 32ch;
    }

    .stay-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .stay-card {
      padding: 14px 14px 12px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(22, 34, 56, 0.08);
    }

    .stay-card .label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stay-card strong {
      display: block;
      font-size: 0.98rem;
      line-height: 1.4;
    }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .action-btn,
    .spot-btn,
    .spot-link,
    .filter-chip {
      appearance: none;
      border: 0;
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background-color 160ms ease, border-color 160ms ease;
    }

    .action-btn {
      padding: 11px 14px;
      background: var(--action);
      color: var(--action-text);
      box-shadow: 0 10px 24px rgba(22, 34, 56, 0.18);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .action-btn.is-secondary {
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      border: 1px solid rgba(22, 34, 56, 0.1);
      box-shadow: none;
    }

    .action-btn.is-tonight-toggle,
    .filter-chip.is-tonight-preset {
      background: linear-gradient(135deg, #2d67ff 0%, #ce3ebd 100%);
      color: #fffaf1;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 14px 28px rgba(106, 73, 191, 0.28);
    }

    .action-btn.is-tonight-toggle.is-inactive,
    .filter-chip.is-tonight-preset.is-inactive {
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      border: 1px solid rgba(22, 34, 56, 0.1);
      box-shadow: none;
    }

    .action-btn:hover,
    .spot-btn:hover,
    .spot-link:hover,
    .filter-chip:hover {
      transform: translateY(-1px);
    }

    .panel-scroll {
      overflow: auto;
      padding: 18px 22px 22px;
    }

    .sidebar-tools {
      margin: 0 0 18px;
      padding: 0 0 16px;
    }

    .search-shell {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(22, 34, 56, 0.1);
      box-shadow: 0 12px 24px rgba(22, 34, 56, 0.08);
    }

    .search-shell span {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .spot-search {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 0.94rem;
      outline: none;
    }

    .spot-search::placeholder {
      color: color-mix(in srgb, var(--muted) 82%, white);
    }

    .category-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-top: 12px;
      scrollbar-width: none;
    }

    .category-tabs::-webkit-scrollbar {
      display: none;
    }

    .category-tab {
      appearance: none;
      border: 1px solid rgba(22, 34, 56, 0.1);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      border-radius: 999px;
      padding: 9px 12px;
      font: inherit;
      font-size: 0.84rem;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 160ms ease, background-color 160ms ease, border-color 160ms ease, color 160ms ease;
    }

    .category-tab:hover {
      transform: translateY(-1px);
    }

    .category-tab.is-active {
      background: var(--action);
      color: var(--action-text);
      border-color: var(--action);
      box-shadow: 0 12px 24px rgba(22, 34, 56, 0.16);
    }

    .category-tab.is-muted {
      opacity: 0.48;
    }

    .category-inline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .category-icon {
      flex: 0 0 auto;
      font-size: 1rem;
      line-height: 1;
    }

    .category-icon.is-mode {
      font-size: 0.95rem;
    }

    .panel-scroll::-webkit-scrollbar {
      width: 10px;
    }

    .panel-scroll::-webkit-scrollbar-thumb {
      background: rgba(22, 34, 56, 0.16);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .section {
      margin-top: 18px;
    }

    .section:first-child {
      margin-top: 0;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 700;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(22, 34, 56, 0.1);
      color: var(--ink);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .filter-chip.is-off {
      opacity: 0.46;
      background: rgba(255, 255, 255, 0.44);
      box-shadow: none;
    }

    .chip-swatch,
    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--swatch);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--swatch) 18%, white);
      flex: 0 0 auto;
    }

    .chip-swatch.is-metro,
    .legend-swatch.is-metro {
      background: linear-gradient(135deg, #009f4d 0 25%, #f08a24 25% 50%, #ffd200 50% 75%, #0079c2 75% 100%);
      box-shadow: 0 0 0 3px rgba(22, 34, 56, 0.08);
    }

    .chip-count {
      display: inline-grid;
      place-items: center;
      min-width: 22px;
      padding: 0 6px;
      height: 22px;
      border-radius: 999px;
      background: rgba(22, 34, 56, 0.08);
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
    }

    .legend-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(22, 34, 56, 0.08);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .legend-note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .spot-list {
      display: grid;
      gap: 14px;
    }

    .spot-group {
      display: grid;
      gap: 12px;
    }

    .spot-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(22, 34, 56, 0.08);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.68);
      color: var(--ink);
      font: inherit;
      cursor: pointer;
    }

    .spot-group-header strong {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 0.98rem;
    }

    .spot-group-arrow {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: rgba(22, 34, 56, 0.08);
      color: var(--muted);
      font-size: 0.82rem;
      transition: transform 160ms ease;
    }

    .spot-group-header[aria-expanded="false"] .spot-group-arrow {
      transform: rotate(-90deg);
    }

    .spot-group-count {
      display: inline-grid;
      place-items: center;
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(22, 34, 56, 0.08);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .spot-group-list {
      display: grid;
      gap: 14px;
    }

    .spot-card {
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(22, 34, 56, 0.09);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(255, 255, 255, 0.86) 100%);
      box-shadow: 0 12px 24px rgba(22, 34, 56, 0.08);
    }

    .spot-card.is-selected {
      border-color: rgba(22, 34, 56, 0.22);
      box-shadow: 0 18px 32px rgba(22, 34, 56, 0.12);
    }

    .spot-topline {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .spot-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--badge) 14%, white);
      color: var(--ink);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .spot-badge::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--badge);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--badge) 16%, white);
    }

    .spot-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .travel-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(22, 34, 56, 0.07);
      color: var(--ink);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .travel-pill.is-distance {
      color: var(--muted);
    }

    .spot-card h3 {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.25;
    }

    .spot-card p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.55;
    }

    .spot-meta {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(22, 34, 56, 0.08);
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .spot-hours-inline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .hours-status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(22, 34, 56, 0.08);
      color: var(--muted);
    }

    .hours-status-pill.is-open {
      background: rgba(47, 158, 114, 0.16);
      color: #1d7a57;
    }

    .hours-status-pill.is-closed {
      background: rgba(22, 34, 56, 0.08);
      color: var(--muted);
    }

    .hours-today {
      font-weight: 700;
      color: var(--ink);
    }

    .spot-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .spot-btn,
    .spot-link {
      padding: 10px 12px;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
    }

    .spot-btn {
      background: rgba(22, 34, 56, 0.08);
      color: var(--ink);
    }

    .legend-item.is-metro-route,
    .legend-popover-item.is-metro-route {
      font-weight: 600;
    }

    .spot-link {
      background: var(--action);
      color: var(--action-text);
    }

    .empty-state {
      padding: 18px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.62);
      border: 1px dashed rgba(22, 34, 56, 0.18);
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
    }

    .map-tools {
      position: fixed;
      top: var(--map-tools-top);
      right: max(18px, calc(env(safe-area-inset-right) + 18px));
      z-index: 750;
      width: max-content;
      pointer-events: none;
    }

    .tool-cluster {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(255, 250, 241, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 14px 30px rgba(22, 34, 56, 0.12);
      pointer-events: auto;
    }

    .weather-pill {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 250, 241, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 12px 24px rgba(22, 34, 56, 0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--ink);
      font-size: 0.82rem;
      font-weight: 700;
      pointer-events: none;
    }

    .service-pill {
      position: absolute;
      top: calc(100% + 56px);
      right: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 250, 241, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 12px 24px rgba(22, 34, 56, 0.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--ink);
      font-size: 0.77rem;
      font-weight: 700;
      pointer-events: none;
      white-space: nowrap;
    }

    .service-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #8c98ab;
      box-shadow: 0 0 0 4px rgba(140, 152, 171, 0.16);
      flex: 0 0 auto;
    }

    .service-pill.is-live .service-dot {
      background: #2f9e72;
      box-shadow: 0 0 0 4px rgba(47, 158, 114, 0.18);
    }

    .service-pill.is-down .service-dot {
      background: #da3f68;
      box-shadow: 0 0 0 4px rgba(218, 63, 104, 0.18);
    }

    .weather-icon {
      font-size: 1rem;
      line-height: 1;
    }

    .weather-meta {
      display: inline-flex;
      align-items: baseline;
      gap: 0;
      white-space: nowrap;
    }

    .weather-temp {
      font-size: 0.88rem;
    }

    .map-tool-btn {
      appearance: none;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(22, 34, 56, 0.08);
      box-shadow: 0 8px 18px rgba(22, 34, 56, 0.1);
      transition: transform 160ms ease, background-color 160ms ease, opacity 160ms ease;
    }

    .map-tool-btn:hover,
    .map-tool-btn:focus-visible {
      transform: translateY(-1px);
      outline: none;
      background: rgba(255, 255, 255, 0.98);
    }

    .map-tool-btn.is-active {
      background: var(--action);
      color: var(--action-text);
      border-color: var(--action);
    }

    .map-tool-btn.is-primary {
      min-height: 42px;
      padding: 0 15px;
      font-size: 0.9rem;
    }

    .map-tool-btn.is-compact {
      width: 42px;
      height: 42px;
      font-size: 1rem;
      display: grid;
      place-items: center;
    }

    .tool-icon {
      width: 18px;
      height: 18px;
      display: block;
      fill: currentColor;
    }

    #locateFab {
      font-size: 1.08rem;
    }

    .legend-popover {
      position: absolute;
      top: calc(100% + 8px);
      right: 56px;
      min-width: 190px;
      max-width: min(240px, calc(100vw - 36px));
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 250, 241, 0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 14px 30px rgba(22, 34, 56, 0.12);
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      visibility: hidden;
      transition: opacity 160ms ease, transform 160ms ease, visibility 160ms ease;
    }

    .filters-popover {
      position: absolute;
      top: calc(100% + 8px);
      right: 104px;
      min-width: 230px;
      max-width: min(320px, calc(100vw - 36px));
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 250, 241, 0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 14px 30px rgba(22, 34, 56, 0.12);
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      visibility: hidden;
      transition: opacity 160ms ease, transform 160ms ease, visibility 160ms ease;
    }

    .map-tools.is-legend-open .legend-popover {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
      visibility: visible;
    }

    .map-tools.is-filters-open .filters-popover {

    .popover-title {

    .metro-live-list {

      gap: 8px;

    .metro-live-item {

      gap: 10px;
      padding: 9px 10px;

      border: 1px solid rgba(22, 34, 56, 0.08);
      font-size: 0.82rem;
      color: var(--ink);

    .metro-live-line {

      align-items: center;
      gap: 9px;
      min-width: 0;
      font-weight: 700;

    .metro-line-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--line-color);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--line-color) 20%, white);
      flex: 0 0 auto;
    }

    .metro-live-status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(22, 34, 56, 0.08);
      color: var(--muted);
    }

    .metro-live-status.is-normal {
      background: rgba(47, 158, 114, 0.14);
      color: #1d7a57;
    }

    .metro-live-status.is-advisory {
      background: rgba(64, 100, 216, 0.14);
      color: #4064d8;
    }

    .metro-live-status.is-disrupted {
      background: rgba(240, 138, 36, 0.16);
      color: #b86513;
    }

    .metro-live-status.is-major {
      background: rgba(218, 63, 104, 0.18);
      color: #b7274e;

    .metro-live-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.4;

    .filters-popover-list {

      gap: 8px;

    .filters-popover .filter-chip {

    .leaflet-control-zoom {

      height: 30px;

      place-items: center;

    .popup-card {

    }

    .popup-kicker {

    .popup-hours {

    .category-marker {

<body>
  <div id="app">
    <div id="map" aria-label="Interactive Montreal trip map"></div>

    <aside class="trip-panel" id="tripPanel">
      <div class="panel-header">
        <div class="eyebrow">Montreal Trip / March 15-17, 2026</div>
        <h1>Montreal Boys Trip 2026</h1>
        <p class="subtitle">
          Pablo, Bakes, Nooper, Phoen, and Bonehead take on Montreal.
        </p>

        <div class="stay-grid">
          <div class="stay-card">
            <span class="label">Check-in</span>
            <strong>Sunday, March 15<br>4:00 PM</strong>
          </div>
          <div class="stay-card">
            <span class="label">Check-out</span>
            <strong>Tuesday, March 17<br>11:00 AM</strong>
          </div>
        </div>

        <div class="quick-actions">
          <button class="action-btn" id="showAllBtn" type="button">Show all spots</button>
          <button class="action-btn is-tonight-toggle is-inactive" id="tonightModeBtn" type="button" aria-pressed="false">Tonight mode</button>
          <button class="action-btn is-secondary" id="hotelBtn" type="button">Back to hotel</button>
        </div>
      </div>

      <div class="panel-scroll">
        <div class="sidebar-tools" id="sidebarTools">
          <label class="search-shell" for="spotSearch">
            <span>Search</span>
            <input class="spot-search" id="spotSearch" type="search" placeholder="Find a spot" autocomplete="off">
          </label>
          <div class="category-tabs" id="categoryTabs"></div>
        </div>
        <div class="spot-list" id="spotList"></div>
      </div>
    </aside>

    <div class="map-tools" id="mapTools">
      <div class="tool-cluster">
        <button class="map-tool-btn is-primary" id="panelFab" type="button" aria-expanded="true">Trip</button>
        <button class="map-tool-btn is-compact" id="locateFab" type="button" aria-label="Locate me">⌖</button>
        <button class="map-tool-btn is-compact" id="themeBtn" type="button" aria-pressed="false" aria-label="Toggle dark mode">☾</button>
        <button class="map-tool-btn is-compact" id="filtersBtn" type="button" aria-expanded="false" aria-label="Show filters">
          <svg class="tool-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 5.5C3 4.67 3.67 4 4.5 4h15a1.5 1.5 0 0 1 1.06 2.56L14 13.12V18a1 1 0 0 1-.45.83l-3 2A1 1 0 0 1 9 20v-6.88L3.44 6.56A1.5 1.5 0 0 1 3 5.5Z"></path>
          </svg>
        </button>
        <button class="map-tool-btn is-compact" id="legendBtn" type="button" aria-expanded="false" aria-label="Show map legend">☰</button>
      </div>
      <div class="weather-pill" id="weatherPill" aria-live="polite" aria-label="Current Montreal weather">
        <span class="weather-icon" id="weatherIcon">⛅</span>
        <span class="weather-meta">
          <span class="weather-temp" id="weatherTemp">--°F</span>
        </span>
      </div>
      <div class="service-pill" id="metroLivePill" aria-live="polite" aria-label="STM live status unknown">
        <span class="service-dot" id="metroLiveDot"></span>
        <span id="metroLiveText">STM unknown</span>
      </div>
      <div class="filters-popover" id="filtersPopover">
        <div class="popover-title">Filters</div>
        <div class="filters-popover-list" id="mobileFilters"></div>
      </div>
      <div class="legend-popover" id="legendPopover">
        <div class="popover-title">Map Legend</div>
        <div class="legend-popover-grid" id="mobileLegend"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="./metro-data.js"></script>
  <script>
    const categories = {

    function prepareMetroData(rawMetroData) {
      if (!rawMetroData || typeof proj4 !== 'function') {

      }

      const projectedToWgs84 = proj4(rawMetroData.projection, 'WGS84');
      const transformPoint = (point) => {
        const [lng, lat] = projectedToWgs84.forward(point);
        return [Number(lat.toFixed(6)), Number(lng.toFixed(6))];
      };

      return {
        routes: rawMetroData.routes.map((route) => ({
          ...route,
          segments: route.segments.map((segment) => segment.map(transformPoint))
        })),
        stations: rawMetroData.stations.map((station) => {
          const [lat, lng] = transformPoint([station.x, station.y]);
          return {
            ...station,
            lat,
            lng
          };
        })
      };

    const baseLayers = {
      light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', baseLayerOptions),
      dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', baseLayerOptions)

    })();

    function applyTheme(mode) {
      const nextMode = mode === 'dark' ? 'dark' : 'light';
      const nextLayer = baseLayers[nextMode];
      const currentLayer = baseLayers[themeMode];

      if (currentLayer && map.hasLayer(currentLayer)) {
        map.removeLayer(currentLayer);
      }

      if (!map.hasLayer(nextLayer)) {
        nextLayer.addTo(map);
      }

      themeMode = nextMode;
      document.body.classList.toggle('is-dark-map', themeMode === 'dark');
      themeBtn.classList.toggle('is-active', themeMode === 'dark');
      themeBtn.setAttribute('aria-pressed', String(themeMode === 'dark'));
      themeBtn.setAttribute('aria-label', themeMode === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
      themeBtn.textContent = themeMode === 'dark' ? '☀' : '☾';

      try {
        window.localStorage.setItem('montreal-map-theme', themeMode);
      } catch (error) {
        // Ignore storage failures in private browsing or locked-down environments.
      }

      renderMetroOverlay();
      setMetroVisibility(metroVisible);
    }

    applyTheme(themeMode);

    function escapeHtml(value) {
      return value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function categoryLabelMarkup(category) {

    function createMarkerIcon(categoryKey) {

    function directionsUrl(spot) {
      return 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(spot.directionsQuery);
    }

    function scheduleForSpot(spot) {
      return hoursBySpotId[spot.id] || null;
    }

    function montrealNowParts() {
      const formatter = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Toronto',
        weekday: 'short',
        hour: 'numeric',
        minute: '2-digit',
        hour12: false
      });
      const parts = Object.fromEntries(formatter.formatToParts(new Date()).map((part) => [part.type, part.value]));
      const weekdayMap = {
        Sun: 'sun',
        Mon: 'mon',
        Tue: 'tue',
        Wed: 'wed',
        Thu: 'thu',
        Fri: 'fri',
        Sat: 'sat'
      };

      return {
        dayKey: weekdayMap[parts.weekday],
        minutes: Number(parts.hour) * 60 + Number(parts.minute)
      };
    }

    function parseTimeLabel(label) {
      const [timePart, meridiem] = label.split(' ');
      let [hours, minutes] = timePart.split(':').map(Number);

      if (meridiem === 'PM' && hours !== 12) {
        hours += 12;
      }

      if (meridiem === 'AM' && hours === 12) {
        hours = 0;
      }

      return hours * 60 + minutes;
    }

    function parseHoursEntry(entry) {
      if (!entry || entry === 'Closed') {
        return { type: 'closed' };
      }

      if (entry === 'Open 24 hours') {
        return { type: 'all-day' };
      }

      const [startLabel, endLabel] = entry.split(' - ');
      const start = parseTimeLabel(startLabel);
      const end = parseTimeLabel(endLabel);

      return {
        type: 'range',
        start,
        end,
        overnight: end <= start
      };
    }

    function todayHoursStatus(spot) {
      const schedule = scheduleForSpot(spot);
      if (!schedule) {
        return null;
      }

      const now = montrealNowParts();
      const todayIndex = weekDayIndex[now.dayKey];
      const prevIndex = (todayIndex + 6) % 7;
      const todayKey = weekDays[todayIndex].key;
      const prevKey = weekDays[prevIndex].key;
      const todayEntry = schedule[todayKey] || 'Closed';
      const prevEntry = schedule[prevKey] || 'Closed';
      const todayParsed = parseHoursEntry(todayEntry);
      const prevParsed = parseHoursEntry(prevEntry);

      let isOpen = false;
      let untilLabel = '';

      if (prevParsed.type === 'range' && prevParsed.overnight && now.minutes < prevParsed.end) {
        isOpen = true;
        untilLabel = prevEntry.split(' - ')[1];
      } else if (todayParsed.type === 'all-day') {
        isOpen = true;
      } else if (todayParsed.type === 'range') {
        if (todayParsed.overnight) {
          if (now.minutes >= todayParsed.start) {
            isOpen = true;
            untilLabel = todayEntry.split(' - ')[1];
          }
        } else if (now.minutes >= todayParsed.start && now.minutes < todayParsed.end) {
          isOpen = true;
          untilLabel = todayEntry.split(' - ')[1];
        }
      }

      return {
        isOpen,
        statusLabel: isOpen ? 'Open now' : 'Closed now',
        detailLabel: isOpen
          ? (todayEntry === 'Open 24 hours' ? '24 hours today' : 'Until ' + untilLabel)
          : (todayEntry === 'Closed' ? 'Closed today' : 'Today: ' + todayEntry),
        todayLabel: weekDays[todayIndex].label + ' ' + todayEntry,
        todayEntry,
        todayKey,
        schedule
      };
    }

    function popupHoursMarkup(spot) {
      const hoursStatus = todayHoursStatus(spot);
      if (!hoursStatus) {
        return '';
      }

      return (
        '<div class="popup-hours">' +
          '<div class="popup-hours-topline">' +
            '<span class="popup-hours-caption">Today</span>' +
            '<span class="hours-status-pill ' + (hoursStatus.isOpen ? 'is-open' : 'is-closed') + '">' + hoursStatus.statusLabel + '</span>' +
            '<span class="popup-note">' + escapeHtml(hoursStatus.detailLabel) + '</span>' +
          '</div>' +
          '<div class="popup-hours-today"><span class="hours-today">' + escapeHtml(hoursStatus.todayLabel) + '</span></div>' +
        '</div>'
      );
    }

    function listHoursMarkup(spot) {
      const hoursStatus = todayHoursStatus(spot);
      if (!hoursStatus) {
        return '';
      }

      return (
        '<div class="spot-hours-inline">' +
          '<span class="hours-status-pill ' + (hoursStatus.isOpen ? 'is-open' : 'is-closed') + '">' + hoursStatus.statusLabel + '</span>' +
          '<span><span class="hours-today">Hours:</span> ' + escapeHtml(hoursStatus.detailLabel) + '</span>' +
        '</div>'
      );
    }

    function weatherDisplay(code, isDay) {
      if (code === 0) {
        return { icon: isDay ? '☀️' : '🌙', label: isDay ? 'Clear' : 'Clear night' };
      }

      if ([1, 2].includes(code)) {
        return { icon: isDay ? '⛅' : '🌙', label: 'Partly cloudy' };
      }

      if (code === 3) {
        return { icon: '☁️', label: 'Cloudy' };
      }

      if ([45, 48].includes(code)) {
        return { icon: '🌫️', label: 'Fog' };
      }

      if ([51, 53, 55, 56, 57].includes(code)) {
        return { icon: '🌦️', label: 'Drizzle' };
      }

      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) {
        return { icon: '🌧️', label: 'Rain' };
      }

      if ([71, 73, 75, 77, 85, 86].includes(code)) {
        return { icon: '🌨️', label: 'Snow' };
      }

      if ([95, 96, 99].includes(code)) {
        return { icon: '⛈️', label: 'Storm' };
      }

      return { icon: '🌤️', label: 'Weather' };
    }

    function setMetroLiveIndicator(state, label) {
      metroLivePill.classList.remove('is-live', 'is-down');
      if (state === 'live') {
        metroLivePill.classList.add('is-live');
      } else if (state === 'down') {
        metroLivePill.classList.add('is-down');
      }

      metroLiveText.textContent = label;
      metroLivePill.setAttribute('aria-label', label);
    }

    async function updateWeather() {
      const weatherUrl =
        'https://api.open-meteo.com/v1/forecast?' +
        'latitude=' + encodeURIComponent(hotelSpot.lat) +
        '&longitude=' + encodeURIComponent(hotelSpot.lng) +
        '&current=temperature_2m,weather_code,is_day' +
        '&temperature_unit=fahrenheit' +
        '&timezone=America%2FToronto';

      try {
        const response = await fetch(weatherUrl, { headers: { Accept: 'application/json' } });
        if (!response.ok) {
          throw new Error('Weather request failed');
        }

        const payload = await response.json();
        const current = payload.current;
        if (!current || typeof current.temperature_2m !== 'number') {
          throw new Error('Missing weather payload');
        }

        const display = weatherDisplay(current.weather_code, current.is_day === 1);
        weatherIconEl.textContent = display.icon;
        weatherTempEl.textContent = Math.round(current.temperature_2m) + '°F';
        weatherPill.setAttribute('aria-label', 'Current Montreal weather: ' + display.label + ', ' + Math.round(current.temperature_2m) + ' degrees Fahrenheit');
      } catch (error) {
        weatherIconEl.textContent = '🌡️';
        weatherTempEl.textContent = '--°F';
        weatherPill.setAttribute('aria-label', 'Current Montreal weather unavailable');
      }
    }

    function spotMatchesTonightMode(spot) {
      if (!tonightMode) {
        return true;
      }

      if (spot.category !== 'food') {
        return true;
      }

      return tonightFoodSpotIds.has(spot.id);
    }

    function isSpotVisible(spot) {
      return activeCategories.has(spot.category) && spotMatchesTonightMode(spot);
    }

    function distanceFromHotel(spot) {
      if (spot.id === hotelSpot.id) {
        return 'Basecamp';
      }

      const toRad = (degrees) => degrees * Math.PI / 180;
      const earthRadiusKm = 6371;
      const dLat = toRad(spot.lat - hotelSpot.lat);
      const dLng = toRad(spot.lng - hotelSpot.lng);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(hotelSpot.lat)) *
          Math.cos(toRad(spot.lat)) *
          Math.sin(dLng / 2) *
          Math.sin(dLng / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      const distance = earthRadiusKm * c;
      const distanceMiles = distance * 0.621371;
      return distanceMiles < 0.1 ? Math.round(distanceMiles * 5280) + ' ft from hotel' : distanceMiles.toFixed(1) + ' mi from hotel';
    }

    function travelTimesForSpot(spot) {
      return travelTimesBySpotId[spot.id] || { walk: '15 min', metro: '8 min' };
    }

    function normalizeText(value) {
      return value
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase();
    }

    function filteredListSpots() {
      const query = normalizeText(searchQuery.trim());
      return visibleSpots().filter((spot) => {
        if (activeListCategory !== 'all' && spot.category !== activeListCategory) {
          return false;
        }

        if (!query) {
          return true;
        }

        return normalizeText(spot.name).includes(query);
      });
    }

    function listGroups() {
      const filtered = filteredListSpots();
      return Object.keys(categories).map((categoryKey) => ({
        categoryKey,
        spots: filtered.filter((spot) => spot.category === categoryKey)
      })).filter((group) => group.spots.length > 0);
    }

    function popupMarkup(spot) {
      const category = categories[spot.category];
      const travelTimes = travelTimesForSpot(spot);
      return (
        '<div class="popup-card" style="--badge:' + category.color + ';">' +
          '<div class="popup-kicker">' + category.label + '</div>' +
          '<h3>' + escapeHtml(spot.name) + '</h3>' +
          '<p>' + escapeHtml(spot.description) + '</p>' +
          '<div class="popup-badges">' +
            '<span class="travel-pill">🚶 ' + escapeHtml(travelTimes.walk) + '</span>' +
            '<span class="travel-pill">🚇 ' + escapeHtml(travelTimes.metro) + '</span>' +
            '<span class="travel-pill is-distance">' + escapeHtml(distanceFromHotel(spot)) + '</span>' +
          '</div>' +
          popupHoursMarkup(spot) +
          '<a class="popup-link" href="' + directionsUrl(spot) + '" target="_blank" rel="noreferrer">Open directions</a>' +
        '</div>'
      );
    }

    function metroLineNames(routeIds) {
      return routeIds.map((routeId) => metroRouteMap[routeId]?.label || ('Line ' + routeId)).join(' / ');
    }

    function metroStatusInfo(routeId) {
      return metroStatusByLineId[String(routeId)] || {
        lineId: String(routeId),
        lineName: metroRouteMap[routeId]?.label || ('Line ' + routeId),
        status: 'normal',
        message: ''
      };
    }

    function metroSeverityRank(status) {
      return { normal: 0, advisory: 1, disrupted: 2, major: 3 }[status] || 0;
    }

    function metroStatusStyle(status, fallbackColor) {
      if (status === 'major') {
        return { color: '#ff5260', weight: window.innerWidth <= 820 ? 5 : 6, opacity: 0.98, dashArray: null };
      }

      if (status === 'disrupted') {
        return { color: '#ffb000', weight: window.innerWidth <= 820 ? 5 : 6, opacity: 0.98, dashArray: '10 8' };
      }

      if (status === 'advisory') {
        return { color: '#4d7cff', weight: window.innerWidth <= 820 ? 4 : 5, opacity: 0.95, dashArray: '6 10' };
      }

      return { color: fallbackColor, weight: window.innerWidth <= 820 ? 4 : 5, opacity: 0.9, dashArray: null };
    }

    function metroServiceSummary(routeIds) {
      const liveStatuses = routeIds.map(metroStatusInfo).sort((a, b) => metroSeverityRank(b.status) - metroSeverityRank(a.status));
      const worst = liveStatuses[0];
      if (!worst || worst.status === 'normal') {
        return '';
      }

      return (
        '<div class="popup-service-note">' +
          '<strong>Live service:</strong> ' + escapeHtml(worst.lineName) + ' ' + escapeHtml(worst.status) +
          (worst.message ? ' - ' + escapeHtml(worst.message) : '') +
        '</div>'
      );
    }

    function metroPopupMarkup(station) {
      const badgeColor = station.routes.length === 1 ? metroRouteMap[station.routes[0]].color : '#162238';
      return (
        '<div class="popup-card" style="--badge:' + badgeColor + ';">' +
          '<div class="popup-kicker">Metro station</div>' +
          '<h3>' + escapeHtml(station.name) + '</h3>' +
          '<p>' + escapeHtml(metroLineNames(station.routes)) + '</p>' +
          metroServiceSummary(station.routes) +
          '<div class="popup-note">' + (station.wheelchair ? 'Wheelchair accessible' : 'Station access varies by entrance') + '</div>' +
          '<a class="popup-link" href="' + escapeHtml(station.url) + '" target="_blank" rel="noreferrer">Station info</a>' +
        '</div>'
      );
    }

    function renderMetroOverlay() {
      if (!metroData) {
        return;
      }

      metroLayer.clearLayers();
      const stationFill = themeMode === 'dark' ? '#0f1829' : '#fffaf1';

      metroData.routes.forEach((route) => {
        const liveStatus = metroStatusInfo(route.id);
        const style = metroStatusStyle(liveStatus.status, route.color);
        route.segments.forEach((segment) => {
        L.polyline(segment, {
          color: style.color,
          weight: style.weight,
          opacity: style.opacity,
          dashArray: style.dashArray,
          lineCap: 'round',
          lineJoin: 'round'
          }).addTo(metroLayer);
        });
      });

      metroData.stations.forEach((station) => {
        const stationStroke = station.routes.length === 1 ? metroRouteMap[station.routes[0]].color : '#162238';
        L.circleMarker([station.lat, station.lng], {
          radius: window.innerWidth <= 820 ? 4.5 : 5.5,
          color: stationStroke,
          weight: 2,
          fillColor: stationFill,
          fillOpacity: 0.98,
          opacity: 1
        })
          .bindPopup(metroPopupMarkup(station), {
            closeButton: true,
            closeOnClick: true,
            autoClose: true
          })
          .addTo(metroLayer);
      });
    }

    function setMetroVisibility(visible) {
      metroVisible = visible && Boolean(metroData);
      if (!metroData) {
        return;
      }

      if (metroVisible && !map.hasLayer(metroLayer)) {
        metroLayer.addTo(map);
      }

      if (!metroVisible && map.hasLayer(metroLayer)) {
        map.removeLayer(metroLayer);
      }
    }

    function focusSpot(spotId) {
      const entry = spotLayers.get(spotId);
      if (!entry) {
        return;
      }

      selectedSpotId = spotId;
      collapsedCategories.delete(entry.spot.category);
      if (activeListCategory !== 'all' && activeListCategory !== entry.spot.category) {
        activeListCategory = entry.spot.category;
        renderCategoryTabs();
      }
      map.closePopup();

      const openPopup = () => {
        entry.marker.openPopup();
      };

      if (entry.area) {
        map.once('moveend', openPopup);
        map.flyToBounds(entry.area.getBounds(), {
          paddingTopLeft: getFitPadding().paddingTopLeft,
          paddingBottomRight: getFitPadding().paddingBottomRight,
          duration: 0.8
        });
      } else {
        map.once('moveend', openPopup);
        map.flyTo([entry.spot.lat, entry.spot.lng], 15, { duration: 0.8 });
      }
      renderSpotList();

      if (window.innerWidth <= 820) {
        tripPanel.classList.add('is-collapsed');
        syncPanelToggleLabel();
      }
    }

    function setLayerVisibility(entry, visible) {
      const hasMarker = map.hasLayer(entry.marker);
      if (visible && !hasMarker) {
        entry.marker.addTo(map);
      }
      if (!visible && hasMarker) {
        map.removeLayer(entry.marker);
      }

      if (entry.area) {
        const hasArea = map.hasLayer(entry.area);
        if (visible && !hasArea) {
          entry.area.addTo(map);
        }
        if (!visible && hasArea) {
          map.removeLayer(entry.area);
        }
      }
    }

    function visibleSpots() {
      return spots.filter(isSpotVisible);
    }

    function getFitPadding() {
      if (window.innerWidth <= 820) {
        return {
          paddingTopLeft: [20, 72],
          paddingBottomRight: [20, 250]
        };
      }

      return {
        paddingTopLeft: [430, 70],
        paddingBottomRight: [70, 70]
      };
    }

    function fitVisibleSpots() {
      const visible = visibleSpots();
      if (!visible.length) {
        return;
      }

      if (visible.length === 1) {
        map.flyTo([visible[0].lat, visible[0].lng], 15, { duration: 0.8 });
        return;
      }

      const bounds = L.latLngBounds(visible.map((spot) => [spot.lat, spot.lng]));
      const padding = getFitPadding();
      map.flyToBounds(bounds, {
        paddingTopLeft: padding.paddingTopLeft,
        paddingBottomRight: padding.paddingBottomRight,
        duration: 0.8
      });
    }

    function updateSpotLayerVisibility() {
      spotLayers.forEach((entry) => {
        setLayerVisibility(entry, isSpotVisible(entry.spot));
      });
    }

    function syncTonightModeUi() {
      document.body.classList.toggle('is-tonight', tonightMode);
      tonightModeBtn.classList.toggle('is-inactive', !tonightMode);
      tonightModeBtn.setAttribute('aria-pressed', String(tonightMode));
      tonightModeBtn.textContent = tonightMode ? 'Tonight on' : 'Tonight mode';
    }

    function refreshVisibleState({ fit = true } = {}) {
      if (!visibleSpots().some((spot) => spot.id === selectedSpotId)) {
        selectedSpotId = hotelSpot.id;
      }
      updateSpotLayerVisibility();
      renderFilters();
      renderLegend();
      renderCategoryTabs();
      renderSpotList();
      syncTonightModeUi();
      if (fit) {
        fitVisibleSpots();
      }
    }

    function disableTonightMode({ restore = true, fit = false } = {}) {
      if (!tonightMode) {
        return;
      }

      tonightMode = false;
      if (restore && tonightModeBackup) {
        activeCategories.clear();
        tonightModeBackup.categories.forEach((categoryKey) => activeCategories.add(categoryKey));
        activeListCategory = tonightModeBackup.activeListCategory;
        setMetroVisibility(tonightModeBackup.metroVisible);
      }
      tonightModeBackup = null;
      refreshVisibleState({ fit });
    }

    function enableTonightMode() {
      if (!tonightMode) {
        tonightModeBackup = {
          categories: [...activeCategories],
          metroVisible,
          activeListCategory
        };
      }

      tonightMode = true;
      activeCategories.clear();
      tonightCategories.forEach((categoryKey) => activeCategories.add(categoryKey));
      activeListCategory = 'all';
      setMetroVisibility(Boolean(metroData));
      refreshVisibleState({ fit: true });
    }

    function toggleTonightMode() {
      if (tonightMode) {
        disableTonightMode({ restore: true, fit: true });
      } else {
        enableTonightMode();
      }
    }

    function toggleCategory(categoryKey) {
      if (tonightMode) {
        disableTonightMode({ restore: false, fit: false });
      }

      if (activeCategories.has(categoryKey)) {
        activeCategories.delete(categoryKey);
      } else {
        activeCategories.add(categoryKey);
      }

      if (!activeCategories.size) {
        activeCategories.add(categoryKey);
      }

      updateSpotLayerVisibility();

      if (!activeCategories.has(spots.find((spot) => spot.id === selectedSpotId)?.category)) {
        selectedSpotId = hotelSpot.id;
      }

      refreshVisibleState({ fit: true });
    }

    function toggleMetroOverlay() {
      if (tonightMode) {
        disableTonightMode({ restore: false, fit: false });
      }
      setMetroVisibility(!metroVisible);
      refreshVisibleState({ fit: false });
    }

    function bindFilterButtons(container) {
      container.querySelectorAll('[data-category]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          toggleCategory(button.dataset.category);
          if (container === mobileFiltersEl) {
            mapTools.classList.add('is-filters-open');
            filtersBtn.setAttribute('aria-expanded', 'true');
          }
        });
      });

      container.querySelectorAll('[data-mode="tonight"]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          toggleTonightMode();
          if (container === mobileFiltersEl) {
            mapTools.classList.add('is-filters-open');
            filtersBtn.setAttribute('aria-expanded', 'true');
          }
        });
      });

      container.querySelectorAll('[data-overlay="metro"]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          toggleMetroOverlay();
          if (container === mobileFiltersEl) {
            mapTools.classList.add('is-filters-open');
            filtersBtn.setAttribute('aria-expanded', 'true');
          }
        });
      });
    }

    function renderCategoryTabs() {
      const visibleCounts = Object.keys(categories).reduce((acc, categoryKey) => {
        acc[categoryKey] = visibleSpots().filter((spot) => spot.category === categoryKey).length;
        return acc;
      }, {});

      const totalVisibleCount = Object.values(visibleCounts).reduce((sum, count) => sum + count, 0);

      const tabsMarkup = [
        '<button class="category-tab ' + (activeListCategory === 'all' ? 'is-active' : '') + '" type="button" data-list-category="all">All (' + totalVisibleCount + ')</button>'
      ].concat(
        Object.entries(categories).map(([key, category]) => {
          const isActive = activeListCategory === key;
          const isMuted = visibleCounts[key] === 0;
          return (
            '<button class="category-tab ' + (isActive ? 'is-active ' : '') + (isMuted ? 'is-muted' : '') + '" type="button" data-list-category="' + key + '">' +
              categoryLabelMarkup(category) + ' (' + visibleCounts[key] + ')' +
            '</button>'
          );
        })
      ).join('');

      categoryTabsEl.innerHTML = tabsMarkup;
      categoryTabsEl.querySelectorAll('[data-list-category]').forEach((button) => {
        button.addEventListener('click', () => {
          const nextCategory = button.dataset.listCategory;
          activeListCategory = nextCategory;
          if (nextCategory !== 'all') {
            collapsedCategories.delete(nextCategory);
          }
          renderCategoryTabs();
          renderSpotList();
          panelScroll.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    function renderFilters() {
      const tonightMarkup = (
        '<button class="filter-chip is-tonight-preset ' + (tonightMode ? '' : 'is-inactive') + '" type="button" data-mode="tonight" aria-pressed="' + String(tonightMode) + '">' +
          modeLabelMarkup('🌃', 'Tonight mode') +
          '<span class="chip-count">' + (tonightMode ? 'ON' : 'PM') + '</span>' +
        '</button>'
      );

      const categoryMarkup = Object.entries(categories).map(([key, category]) => {
        const active = activeCategories.has(key);
        return (
          '<button class="filter-chip ' + (active ? '' : 'is-off') + '" type="button" data-category="' + key + '" style="--swatch:' + category.color + ';" aria-pressed="' + String(active) + '">' +
            '<span class="chip-swatch"></span>' +
            categoryLabelMarkup(category) +
            '<span class="chip-count">' + (counts[key] || 0) + '</span>' +
          '</button>'
        );
      }).join('');

      const metroMarkup = metroData ? (
        '<button class="filter-chip ' + (metroVisible ? '' : 'is-off') + '" type="button" data-overlay="metro" aria-pressed="' + String(metroVisible) + '">' +
          '<span class="chip-swatch is-metro"></span>' +
          '<span>Metro</span>' +
          '<span class="chip-count">' + metroCount + '</span>' +
        '</button>'
      ) : '';

      const filtersMarkup = tonightMarkup + categoryMarkup + metroMarkup;

      mobileFiltersEl.innerHTML = filtersMarkup;
      bindFilterButtons(mobileFiltersEl);
    }

    function renderLegend() {
      const mobileSpotLegend = Object.values(categories).map((category) => {
        return (
          '<div class="legend-popover-item">' +
            '<span class="legend-swatch" style="--swatch:' + category.color + ';"></span>' +
            categoryLabelMarkup(category) +
          '</div>'
        );
      }).join('');

      const mobileMetroLegend = metroData ? metroData.routes.map((route) => {
        const liveStatus = metroStatusInfo(route.id);
        return (
          '<div class="legend-popover-item is-metro-route">' +
            '<span class="legend-swatch" style="--swatch:' + route.color + ';"></span>' +
            '<span>' + route.label + '</span>' +
          '</div>'
        );
      }).join('') : '';

      const metroLiveMarkup = metroData ? (
        '<div class="legend-popover-section">' +
          '<div class="popover-title">Live Metro Status</div>' +
          '<div class="metro-live-list">' +
            metroData.routes.map((route) => {
              const liveStatus = metroStatusInfo(route.id);
              return (
                '<div class="metro-live-item">' +
                  '<span class="metro-live-line">' +
                    '<span class="metro-line-dot" style="--line-color:' + route.color + ';"></span>' +
                    '<span>' + route.label + '</span>' +
                  '</span>' +
                  '<span class="metro-live-status is-' + liveStatus.status + '">' + escapeHtml(liveStatus.status) + '</span>' +
                '</div>'
              );
            }).join('') +
          '</div>' +
          '<div class="metro-live-note">' +
            (metroStatusUpdatedAt ? 'Updated ' + escapeHtml(metroStatusUpdatedAt) : 'Live status from STM when available.') +
          '</div>' +
        '</div>'
      ) : '';

      mobileLegendEl.innerHTML = mobileSpotLegend + mobileMetroLegend + metroLiveMarkup;
    }

    async function fetchMetroStatus() {
      if (!metroData) {
        setMetroLiveIndicator('down', 'STM unavailable');
        return;
      }

      try {
        const response = await fetch('/.netlify/functions/metro-status', {
          headers: { Accept: 'application/json' }
        });

        if (!response.ok) {
          throw new Error('Metro status request failed');
        }

        const payload = await response.json();
        if (!Array.isArray(payload)) {
          throw new Error('Unexpected metro status payload');
        }

        metroStatusByLineId = Object.fromEntries(payload.map((entry) => [String(entry.lineId), entry]));
        metroStatusUpdatedAt = new Intl.DateTimeFormat('en-US', {
          timeZone: 'America/Toronto',
          hour: 'numeric',
          minute: '2-digit'
        }).format(new Date());
        setMetroLiveIndicator('live', 'STM live');
        renderMetroOverlay();
        setMetroVisibility(metroVisible);
        renderLegend();
      } catch (error) {
        setMetroLiveIndicator('down', 'STM unavailable');
        // Keep the static metro overlay if the live endpoint is unavailable.
      }
    }

    function renderSpotList() {
      const groups = listGroups();
      const anyVisibleSpots = visibleSpots().length > 0;

      if (!anyVisibleSpots) {
        spotListEl.innerHTML = '<div class="empty-state">Everything is filtered out right now. Turn a category back on to see spots again.</div>';
        return;
      }

      if (!groups.length) {
        spotListEl.innerHTML = '<div class="empty-state">No spots match that search. Try a different name or clear the category tab.</div>';
        return;
      }

      spotListEl.innerHTML = groups.map((group) => {
        const category = categories[group.categoryKey];
        const isCollapsed = collapsedCategories.has(group.categoryKey);

        const cardsMarkup = group.spots.map((spot) => {
          const selectedClass = spot.id === selectedSpotId ? 'is-selected' : '';
          const travelTimes = travelTimesForSpot(spot);
          return (
            '<article class="spot-card ' + selectedClass + '" data-spot-id="' + spot.id + '">' +
              '<div class="spot-topline">' +
                '<span class="spot-badge" style="--badge:' + category.color + ';">' + categoryLabelMarkup(category) + '</span>' +
              '</div>' +
              '<h3>' + escapeHtml(spot.name) + '</h3>' +
              '<div class="spot-badges">' +
                '<span class="travel-pill">🚶 ' + escapeHtml(travelTimes.walk) + '</span>' +
                '<span class="travel-pill">🚇 ' + escapeHtml(travelTimes.metro) + '</span>' +
                '<span class="travel-pill is-distance">' + escapeHtml(distanceFromHotel(spot)) + '</span>' +
              '</div>' +
              '<p>' + escapeHtml(spot.description) + '</p>' +
              listHoursMarkup(spot) +
              '<div class="spot-meta">' + escapeHtml(spot.address) + '</div>' +
              '<div class="spot-actions">' +
                '<button class="spot-btn" type="button" data-focus-id="' + spot.id + '">View on map</button>' +
                '<a class="spot-link" href="' + directionsUrl(spot) + '" target="_blank" rel="noreferrer">Directions</a>' +
              '</div>' +
            '</article>'
          );
        }).join('');

        return (
          '<section class="spot-group" data-group-category="' + group.categoryKey + '">' +
            '<button class="spot-group-header" type="button" data-toggle-group="' + group.categoryKey + '" aria-expanded="' + String(!isCollapsed) + '">' +
              '<strong><span class="spot-group-arrow">▾</span>' + categoryLabelMarkup(category) + '</strong>' +
              '<span class="spot-group-count">' + group.spots.length + '</span>' +
            '</button>' +
            '<div class="spot-group-list" ' + (isCollapsed ? 'hidden' : '') + '>' + cardsMarkup + '</div>' +
          '</section>'
        );
      }).join('');

      spotListEl.querySelectorAll('[data-focus-id]').forEach((button) => {
        button.addEventListener('click', () => {
          focusSpot(button.dataset.focusId);
        });
      });

      spotListEl.querySelectorAll('[data-toggle-group]').forEach((button) => {
        button.addEventListener('click', () => {
          const categoryKey = button.dataset.toggleGroup;
          if (collapsedCategories.has(categoryKey)) {
            collapsedCategories.delete(categoryKey);
          } else {
            collapsedCategories.add(categoryKey);
          }
          renderSpotList();
        });
      });
    }

    function addSpotToMap(spot) {
      const category = categories[spot.category];
      const marker = L.marker([spot.lat, spot.lng], { icon: createMarkerIcon(spot.category) }).bindPopup(popupMarkup(spot), {
        closeButton: true,
        closeOnClick: true,
        autoClose: true
      });
      let area = null;

      if (spot.radius) {
        area = L.circle([spot.lat, spot.lng], {
          pane: 'areas',
          radius: spot.radius,
          weight: 1.5,
          color: category.color,
          fillColor: category.color,
          fillOpacity: 0.12,
          dashArray: '6 10'
        });

        area.on('click', () => {
          focusSpot(spot.id);
        });
      }

      marker.on('click', () => {
        selectedSpotId = spot.id;
        renderSpotList();
      });

      marker.addTo(map);
      if (area) {
        area.addTo(map);
      }

      spotLayers.set(spot.id, { spot, marker, area });
    }

    function syncPanelToggleLabel() {
      return;
    }

    function syncPanelFabLabel() {
      const panelVisible = !tripPanel.classList.contains('is-hidden-panel');
      panelFab.setAttribute('aria-expanded', String(panelVisible));
      panelFab.textContent = panelVisible ? 'Hide trip' : 'Trip';
    }

    function hidePanel() {
      tripPanel.classList.add('is-hidden-panel');
      tripPanel.classList.remove('is-collapsed');
      syncPanelFabLabel();
    }

    function showPanel() {
      tripPanel.classList.remove('is-hidden-panel');
      tripPanel.classList.remove('is-collapsed');
      syncPanelFabLabel();
    }

    function syncPanelState() {
      const isMobile = window.innerWidth <= 820;

      if (isMobile) {
        if (wasMobile !== true) {
          tripPanel.classList.add('is-collapsed');
          tripPanel.classList.remove('is-hidden-panel');
        }
      } else {
        tripPanel.classList.remove('is-collapsed');
        mapTools.classList.remove('is-filters-open');
        mapTools.classList.remove('is-legend-open');
        filtersBtn.setAttribute('aria-expanded', 'false');
        legendBtn.setAttribute('aria-expanded', 'false');
      }

      wasMobile = isMobile;
      renderMetroOverlay();
      setMetroVisibility(metroVisible);
      syncPanelFabLabel();
    }

    function syncMapToolsTop() {
      const viewportOffsetTop = window.visualViewport ? window.visualViewport.offsetTop : 0;
      const topValue = Math.max(12, Math.round(viewportOffsetTop + 12));
      document.documentElement.style.setProperty('--map-tools-top', topValue + 'px');
    }

    spotSearchInput.addEventListener('input', (event) => {
      searchQuery = event.target.value;
      renderSpotList();
    });

    panelFab.addEventListener('click', () => {
      if (tripPanel.classList.contains('is-hidden-panel')) {
        showPanel();
      } else if (window.innerWidth <= 820 && tripPanel.classList.contains('is-collapsed')) {
        tripPanel.classList.remove('is-collapsed');
        syncPanelFabLabel();
      } else {
        hidePanel();
      }
    });

    filtersBtn.addEventListener('click', () => {
      const nextState = !mapTools.classList.contains('is-filters-open');
      mapTools.classList.remove('is-legend-open');
      legendBtn.setAttribute('aria-expanded', 'false');
      mapTools.classList.toggle('is-filters-open', nextState);
      filtersBtn.setAttribute('aria-expanded', String(nextState));
    });

    legendBtn.addEventListener('click', () => {
      const nextState = !mapTools.classList.contains('is-legend-open');
      mapTools.classList.remove('is-filters-open');
      filtersBtn.setAttribute('aria-expanded', 'false');
      mapTools.classList.toggle('is-legend-open', nextState);
      legendBtn.setAttribute('aria-expanded', String(nextState));
    });

    legendBtn.addEventListener('mouseenter', () => {
      if (window.innerWidth > 820) {
        mapTools.classList.remove('is-filters-open');
        mapTools.classList.add('is-legend-open');
      }
    });

    legendBtn.addEventListener('mouseleave', () => {
      if (window.innerWidth > 820) {
        mapTools.classList.remove('is-legend-open');
        legendBtn.setAttribute('aria-expanded', 'false');
      }
    });

    legendBtn.addEventListener('focus', () => {
      mapTools.classList.remove('is-filters-open');
      mapTools.classList.add('is-legend-open');
    });

    legendBtn.addEventListener('blur', () => {
      if (window.innerWidth > 820) {
        mapTools.classList.remove('is-legend-open');
        legendBtn.setAttribute('aria-expanded', 'false');
      }
    });

    showAllBtn.addEventListener('click', () => {
      fitVisibleSpots();
    });

    tonightModeBtn.addEventListener('click', toggleTonightMode);

    hotelBtn.addEventListener('click', () => {
      activeCategories.add('hotel');
      refreshVisibleState({ fit: false });
      setLayerVisibility(spotLayers.get(hotelSpot.id), true);
      focusSpot(hotelSpot.id);
    });

    function requestLocation() {
      map.locate({ setView: true, maxZoom: 15, enableHighAccuracy: true });
    }

    locateFab.addEventListener('click', requestLocation);
    themeBtn.addEventListener('click', () => {
      applyTheme(themeMode === 'dark' ? 'light' : 'dark');
    });

    document.addEventListener('click', (event) => {
      if (!mapTools.contains(event.target)) {
        mapTools.classList.remove('is-filters-open');
        mapTools.classList.remove('is-legend-open');
        filtersBtn.setAttribute('aria-expanded', 'false');
        legendBtn.setAttribute('aria-expanded', 'false');
      }
    });

    function autoHidePanelAfterMapInteraction() {
      if (window.innerWidth > 820 || hasAutoHiddenPanel) {
        return;
      }

      hasAutoHiddenPanel = true;
      hidePanel();
    }

    map.on('click', autoHidePanelAfterMapInteraction);
    map.on('dragstart', autoHidePanelAfterMapInteraction);
    map.on('zoomstart', autoHidePanelAfterMapInteraction);

    map.on('locationfound', (event) => {
      if (userMarker) {
        map.removeLayer(userMarker);
      }

      if (userHalo) {
        map.removeLayer(userHalo);
      }

      userHalo = L.circle(event.latlng, {
        radius: event.accuracy,
        color: '#2f9e72',
        weight: 1,
        fillColor: '#2f9e72',
        fillOpacity: 0.08
      }).addTo(map);

      userMarker = L.marker(event.latlng, {
        icon: L.divIcon({
          className: '',
          html: '<div class="current-user-dot"></div>',
          iconSize: [18, 18],
          iconAnchor: [9, 9]
        })
      }).addTo(map);

      userMarker.bindPopup('<div class="popup-card"><div class="popup-kicker" style="--badge:#2f9e72;">Your location</div><h3>You are here</h3><p>Useful for checking what is actually close once you are out walking.</p></div>', {
        closeButton: true,
        closeOnClick: true,
        autoClose: true
      });
      userMarker.openPopup();
    });

    map.on('locationerror', () => {
      locateFab.textContent = '!';
      window.setTimeout(() => {
        locateFab.textContent = '⌖';
      }, 2200);
    });

    spots.forEach(addSpotToMap);
    renderMetroOverlay();
    setMetroVisibility(metroVisible);
    renderLegend();
    renderFilters();
    renderCategoryTabs();
    renderSpotList();
    syncTonightModeUi();
    syncMapToolsTop();
    syncPanelState();
    updateWeather();
    fetchMetroStatus();

    map.setView([45.5123, -73.5728], 13);
    window.setTimeout(() => {
      map.invalidateSize();
      fitVisibleSpots();
    }, 180);

    window.addEventListener('resize', () => {
      syncMapToolsTop();
      syncPanelState();
      map.invalidateSize();
    });

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', syncMapToolsTop);
      window.visualViewport.addEventListener('scroll', syncMapToolsTop);
    }

    window.setInterval(updateWeather, 15 * 60 * 1000);
    window.setInterval(fetchMetroStatus, 2 * 60 * 1000);
  </script>
</body>
</html>
